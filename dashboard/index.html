<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titan 360 — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
:root{--titan-forest:#003822;--titan-teal:#22B9B0;--titan-plum:#3F1038;--titan-cream:#F7F3EC;--titan-ink:#1A1A1A;--titan-stone:#8B857A;--titan-gold:#D4A843}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Work Sans',system-ui,sans-serif;background:var(--titan-cream);color:var(--titan-ink);line-height:1.5;min-height:100vh}
h1{font-family:'Domaine Display',Georgia,serif;font-size:1.5rem;color:var(--titan-forest)}

/* ── Header ── */
.dash-header{background:var(--titan-forest);color:#fff;padding:1rem 2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
.dash-header h1{color:#fff;font-size:1.25rem}
.dash-header .sep{width:1px;height:24px;background:rgba(255,255,255,.3)}
.dash-header .subtitle{font-size:.85rem;color:rgba(255,255,255,.6)}
.header-right{margin-left:auto;display:flex;gap:.75rem;align-items:center}
.btn-new{padding:.5rem 1.25rem;font:inherit;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:var(--titan-gold);color:var(--titan-forest);border:none;border-radius:50px;cursor:pointer;text-decoration:none;transition:opacity .15s}
.btn-new:hover{opacity:.85}

/* ── Toolbar ── */
.toolbar{padding:1rem 2rem;display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;border-bottom:1px solid #e0dcd6}
.toolbar-count{font-weight:700;font-size:1.1rem;color:var(--titan-forest);margin-right:auto}
.search-box{padding:.5rem .75rem;border:1.5px solid #ccc;border-radius:50px;font:inherit;font-size:.9rem;width:220px;background:#fff}
.search-box:focus{outline:none;border-color:var(--titan-teal)}
.filter-select{padding:.5rem .75rem;border:1.5px solid #ccc;border-radius:50px;font:inherit;font-size:.85rem;background:#fff;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--titan-teal)}

/* ── Table ── */
.plans-table{width:100%;border-collapse:collapse}
.plans-table th{text-align:left;padding:.6rem 1rem;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--titan-stone);border-bottom:2px solid #e0dcd6;background:var(--titan-cream);position:sticky;top:52px;z-index:5}
.plans-table td{padding:.75rem 1rem;border-bottom:1px solid #eee;font-size:.9rem;vertical-align:top}
.plans-table tr:hover td{background:rgba(34,185,176,.04)}
.plans-table tr{cursor:pointer}
.client-name{font-weight:600;color:var(--titan-forest)}
.client-contact{font-size:.8rem;color:var(--titan-stone)}
.plan-estimate{font-weight:600;color:var(--titan-forest)}
.plan-summary{font-size:.8rem;color:var(--titan-stone);max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.date-cell{font-size:.82rem;color:var(--titan-stone);white-space:nowrap}
.arrow-cell{text-align:right;color:var(--titan-stone);font-size:1.2rem}

/* ── Status badges ── */
.status-badge{display:inline-block;padding:.2rem .6rem;border-radius:50px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.status-new{background:#e8f8f7;color:var(--titan-teal)}
.status-in-progress{background:#fff3cd;color:#856404}
.status-presented{background:#d4edda;color:#155724}
.status-closed-won{background:var(--titan-forest);color:#fff}
.status-closed-lost{background:#f0eae6;color:var(--titan-stone)}

/* ── Inline edit ── */
.status-select{padding:.2rem .4rem;border:1px solid #ccc;border-radius:4px;font:inherit;font-size:.8rem;background:#fff;cursor:pointer}
.notes-input{width:100%;padding:.3rem .5rem;border:1px solid #ddd;border-radius:4px;font:inherit;font-size:.82rem;background:#fff;resize:vertical;min-height:28px}
.notes-input:focus,.status-select:focus{outline:none;border-color:var(--titan-teal)}

/* ── Empty state ── */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--titan-stone)}
.empty-state h2{font-family:'Domaine Display',Georgia,serif;color:var(--titan-forest);margin-bottom:.5rem}

/* ── Responsive ── */
@media(max-width:768px){
  .dash-header{padding:.75rem 1rem}
  .toolbar{padding:.75rem 1rem}
  .plans-table th,.plans-table td{padding:.5rem .6rem;font-size:.82rem}
  .search-box{width:160px}
  .col-hide-mobile{display:none}
}
</style>
</head>
<body>

<div class="dash-header">
  <h1>Titan <span style="color:var(--titan-teal)">360</span></h1>
  <div class="sep"></div>
  <span class="subtitle">Plans Dashboard</span>
  <div class="header-right">
    <a href="../" class="btn-new">+ New Plan</a>
  </div>
</div>

<div class="toolbar">
  <span class="toolbar-count" id="planCount">All Plans (0)</span>
  <select class="filter-select" id="statusFilter">
    <option value="">All Statuses</option>
    <option value="new">New</option>
    <option value="in-progress">In Progress</option>
    <option value="presented">Presented</option>
    <option value="closed-won">Closed — Won</option>
    <option value="closed-lost">Closed — Lost</option>
  </select>
  <input type="text" class="search-box" id="searchBox" placeholder="Search by name...">
</div>

<table class="plans-table">
  <thead>
    <tr>
      <th>Client</th>
      <th>State</th>
      <th>Estimate</th>
      <th>Product</th>
      <th>Status</th>
      <th class="col-hide-mobile">Notes</th>
      <th>Created</th>
      <th>Last Accessed</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="plansBody"></tbody>
</table>

<div class="empty-state" id="emptyState" hidden>
  <h2>No plans yet</h2>
  <p>Create your first estimate to see it here.</p>
  <br>
  <a href="../" class="btn-new">+ New Plan</a>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBvJMtP2zQ1tEH4KR6mSkaN_VcLZGiI1LQ",
  authDomain:"titan-estimate.firebaseapp.com",
  projectId:"titan-estimate",
  storageBucket:"titan-estimate.firebasestorage.app",
  messagingSenderId:"1056635262637",
  appId:"1:1056635262637:web:c1d6082112317a9c141824"
});
const db=firebase.firestore();

const STATUS_LABELS={'new':'New','in-progress':'In Progress','presented':'Presented','closed-won':'Closed — Won','closed-lost':'Closed — Lost'};
const PRODUCT_LABELS={'':'—','ga-spp':'GA - SPP','ga-encore30':'GA - Encore 30','ts-std':'TS - Std'};
const PRODUCT_OPTIONS=Object.entries(PRODUCT_LABELS).map(([v,t])=>`<option value="${v}">${t}</option>`).join('');

let allPlans=[];

function fmtDate(ts){
  if(!ts)return '—';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function fmtMoney(n){return n?'$'+Math.round(n/10)*10 .toLocaleString('en-US'):'—'}

function renderPlans(plans){
  const body=document.getElementById('plansBody');
  const empty=document.getElementById('emptyState');

  if(!plans.length){
    body.innerHTML='';
    empty.hidden=false;
    document.getElementById('planCount').textContent='All Plans (0)';
    return;
  }
  empty.hidden=true;
  document.getElementById('planCount').textContent=`All Plans (${plans.length})`;

  body.innerHTML=plans.map(p=>{
    const d=p.data;
    const mid=d.totalMid?'$'+Math.round(d.totalMid/10)*10:'-';
    const lo=d.totalLo?'$'+Math.round(d.totalLo/10)*10:'';
    const hi=d.totalHi?'$'+Math.round(d.totalHi/10)*10:'';
    const range=lo&&hi?`${lo} – ${hi}`:'';
    const statusClass='status-'+(d.status||'new');
    return `<tr data-id="${p.id}">
      <td>
        <div class="client-name">${d.clientName||'Unnamed'}</div>
        <div class="client-contact">${[d.clientPhone,d.clientEmail].filter(Boolean).join(' · ')||''}</div>
      </td>
      <td>${d.state||'—'}</td>
      <td>
        <div class="plan-estimate">${mid}</div>
        <div class="plan-summary">${range}</div>
      </td>
      <td>
        <select class="status-select product-select" data-id="${p.id}" data-field="product" onclick="event.stopPropagation()">
          ${Object.entries(PRODUCT_LABELS).map(([v,t])=>`<option value="${v}"${d.product===v?' selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td>
        <select class="status-select" data-id="${p.id}" data-field="status" onclick="event.stopPropagation()">
          ${Object.entries(STATUS_LABELS).map(([v,t])=>`<option value="${v}"${d.status===v?' selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td class="col-hide-mobile">
        <textarea class="notes-input" data-id="${p.id}" onclick="event.stopPropagation()" placeholder="Add notes...">${d.notes||''}</textarea>
      </td>
      <td class="date-cell">${fmtDate(d.createdAt)}</td>
      <td class="date-cell">${fmtDate(d.lastAccessedAt)}</td>
      <td class="arrow-cell">→</td>
    </tr>`;
  }).join('');

  /* Wire row clicks → open plan */
  body.querySelectorAll('tr').forEach(tr=>{
    tr.addEventListener('click',()=>{
      window.location.href='../?plan='+tr.dataset.id;
    });
  });

  /* Wire select changes (status + product) */
  body.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('change',async function(){
      const field=this.dataset.field||'status';
      await db.collection('plans').doc(this.dataset.id).update({[field]:this.value});
    });
  });

  /* Wire notes save on blur */
  body.querySelectorAll('.notes-input').forEach(ta=>{
    ta.addEventListener('blur',async function(){
      await db.collection('plans').doc(this.dataset.id).update({notes:this.value});
    });
  });
}

function applyFilters(){
  const search=document.getElementById('searchBox').value.toLowerCase().trim();
  const status=document.getElementById('statusFilter').value;
  let filtered=allPlans;
  if(search) filtered=filtered.filter(p=>(p.data.clientName||'').toLowerCase().includes(search)||(p.data.clientEmail||'').toLowerCase().includes(search)||(p.data.clientPhone||'').includes(search));
  if(status) filtered=filtered.filter(p=>p.data.status===status);
  renderPlans(filtered);
}

document.getElementById('searchBox').addEventListener('input',applyFilters);
document.getElementById('statusFilter').addEventListener('change',applyFilters);

/* Load plans — real-time listener */
db.collection('plans').orderBy('lastAccessedAt','desc').onSnapshot(snap=>{
  allPlans=snap.docs.map(d=>({id:d.id,data:d.data()}));
  applyFilters();
},err=>{
  console.error('Firestore error:',err);
  document.getElementById('plansBody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:2rem;color:red">Error loading plans. Check Firestore setup.</td></tr>';
});
</script>
</body>
</html>
